<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KeyChinGu — 서울 여행 큐레이션</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <a href="index.html"><img src="assets/logo/logo_2-4_color_small.png" alt="KeyChinGu" class="site-logo"></a>
  <div class="lang-switch">
    <a href="index.html" class="active">KR</a>
    <a href="en/index.html">EN</a>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <img src="assets/logo/logo_2-4_expression.png" alt="KeyChinGu" class="hero-logo">
  <h1>Seoul <em>for</em> You</h1>
  <p>한국을 방문하는 외국인 여행자를 위한 큐레이션 가이드 20선</p>
</section>

<!-- CATEGORY FILTER -->
<div class="filter-bar">
  <button class="filter-btn" data-category="A">동네 탐방</button>
  <button class="filter-btn" data-category="B">자연 & 산책</button>
  <button class="filter-btn" data-category="C">먹거리</button>
  <button class="filter-btn" data-category="D">문화 체험</button>
  <button class="filter-btn" data-category="E">뷰티 & 웰니스</button>
  <button class="filter-btn" data-category="F">쇼핑</button>
  <button class="filter-btn" data-category="G">K-콘텐츠</button>
  <button class="filter-btn" data-category="H">실용 가이드</button>
</div>

<!-- TAG FILTER -->
<div class="tag-bar">
  <button class="tag-btn" data-tag="foodie">foodie</button>
  <button class="tag-btn" data-tag="free">free</button>
  <button class="tag-btn" data-tag="nightlife">nightlife</button>
  <button class="tag-btn" data-tag="culture">culture</button>
  <button class="tag-btn" data-tag="shopping">shopping</button>
  <button class="tag-btn" data-tag="photo">photo</button>
  <button class="tag-btn" data-tag="beauty">beauty</button>
  <button class="tag-btn" data-tag="outdoor">outdoor</button>
  <button class="tag-btn" data-tag="practical">practical</button>
  <button class="tag-btn" data-tag="mz">mz</button>
  <button class="tag-btn" data-tag="must-try">must-try</button>
  <button class="tag-btn" data-tag="cafe">cafe</button>
  <button class="tag-btn" data-tag="market">market</button>
  <button class="tag-btn" data-tag="beer">beer</button>
  <button class="tag-btn" data-tag="latenight">latenight</button>
  <button class="tag-btn" data-tag="retro">retro</button>
  <button class="tag-btn" data-tag="hanbok">hanbok</button>
  <button class="tag-btn" data-tag="kdrama">kdrama</button>
  <button class="tag-btn" data-tag="kpop">kpop</button>
  <button class="tag-btn" data-tag="wellness">wellness</button>
  <button class="tag-btn" data-tag="fun">fun</button>
  <button class="tag-btn" data-tag="budget">budget</button>
  <button class="tag-btn" data-tag="transport">transport</button>
  <button class="tag-btn" data-tag="popup">popup</button>
</div>

<!-- CARD GRID -->
<div class="card-grid" id="card-grid">
  <!-- JS renders cards here -->
</div>

<!-- FOOTER -->
<footer class="site-footer">
  <p><a href="https://instagram.com/keychingu.korea" target="_blank">@keychingu.korea</a> &mdash; Seoul for MZ FIT Travelers</p>
</footer>

<script src="assets/js/filter.js"></script>
</body>
</html>
